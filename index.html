<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cissy Intel">
<title>Cissy's Morning Intel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0d0b0e; --surface: #161219; --border: rgba(255,255,255,0.07); --gold: #c9a96e; --gold-dim: rgba(201,169,110,0.15); --gold-glow: rgba(201,169,110,0.08); --rose: #d4788a; --rose-dim: rgba(212,120,138,0.15); --sage: #7a9e8e; --sage-dim: rgba(122,158,142,0.15); --lavender: #9b8fc4; --lavender-dim: rgba(155,143,196,0.15); --text: #f0ece6; --text-muted: rgba(240,236,230,0.45); --text-dim: rgba(240,236,230,0.25); }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Cormorant Garamond', serif; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 20% 20%, rgba(201,169,110,0.04) 0%, transparent 60%), radial-gradient(ellipse 50% 50% at 80% 80%, rgba(155,143,196,0.04) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
  .header { padding: 52px 28px 20px; flex-shrink: 0; }
  .header-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-size: 32px; font-weight: 300; letter-spacing: -0.01em; line-height: 1; }
  .header-title em { font-style: italic; color: var(--gold); }
  #home { flex: 1; display: flex; flex-direction: column; padding: 8px 20px 32px; overflow: hidden; }
  .date-line { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; padding: 0 8px; margin-bottom: 24px; }
  .briefing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1; }
  .briefing-btn { position: relative; border: 1px solid var(--border); border-radius: 16px; background: var(--surface); cursor: pointer; padding: 24px 20px 22px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; transition: transform 0.15s ease; -webkit-user-select: none; user-select: none; }
  .briefing-btn:active { transform: scale(0.97); }
  .briefing-btn::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.2s ease; border-radius: 16px; }
  .briefing-btn:active::before { opacity: 1; }
  .btn-claude { border-color: rgba(201,169,110,0.2); } .btn-claude::before { background: var(--gold-glow); } .btn-claude .btn-accent { color: var(--gold); } .btn-claude .btn-glow { background: var(--gold-dim); }
  .btn-indie { border-color: rgba(122,158,142,0.2); } .btn-indie::before { background: rgba(122,158,142,0.05); } .btn-indie .btn-accent { color: var(--sage); } .btn-indie .btn-glow { background: var(--sage-dim); }
  .btn-podcast { border-color: rgba(155,143,196,0.2); } .btn-podcast::before { background: rgba(155,143,196,0.05); } .btn-podcast .btn-accent { color: var(--lavender); } .btn-podcast .btn-glow { background: var(--lavender-dim); }
  .btn-romance { border-color: rgba(212,120,138,0.2); } .btn-romance::before { background: rgba(212,120,138,0.05); } .btn-romance .btn-accent { color: var(--rose); } .btn-romance .btn-glow { background: var(--rose-dim); }
  .btn-glow { position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; border-radius: 50%; filter: blur(30px); pointer-events: none; }
  .btn-keyword { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 10px; opacity: 0.5; }
  .btn-label { font-size: 26px; font-weight: 300; line-height: 1.1; letter-spacing: -0.02em; }
  .btn-label em { font-style: italic; display: block; }
  .btn-desc { font-family: 'DM Mono', monospace; font-size: 9.5px; color: var(--text-muted); letter-spacing: 0.04em; line-height: 1.5; margin-top: 12px; }
  .btn-arrow { position: absolute; bottom: 18px; right: 18px; font-size: 16px; opacity: 0.3; }
  #briefing-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  #briefing-screen.active { display: flex; }
  .briefing-header { padding: 0 28px 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
  .back-btn { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 6px; }
  .briefing-keyword { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }
  .audio-bar { margin: 0 20px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .play-btn { width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; transition: transform 0.1s ease; }
  .play-btn:active { transform: scale(0.92); }
  .progress-wrap { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s linear; }
  .audio-status { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; color: var(--text-dim); white-space: nowrap; }
  .briefing-content { flex: 1; overflow-y: auto; padding: 0 28px 40px; -webkit-overflow-scrolling: touch; }
  .briefing-content::-webkit-scrollbar { display: none; }
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 16px; }
  .loading-dots { display: flex; gap: 8px; }
  .loading-dots span { width: 6px; height: 6px; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; } .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; animation: fadetext 2s ease-in-out infinite; }
  @keyframes fadetext { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  .briefing-items { display: flex; flex-direction: column; gap: 20px; padding-top: 4px; }
  .briefing-item { padding: 18px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; position: relative; overflow: hidden; opacity: 0; transform: translateY(10px); animation: slideIn 0.4s ease forwards; }
  .briefing-item:nth-child(1) { animation-delay: 0.05s; } .briefing-item:nth-child(2) { animation-delay: 0.1s; } .briefing-item:nth-child(3) { animation-delay: 0.15s; } .briefing-item:nth-child(4) { animation-delay: 0.2s; } .briefing-item:nth-child(5) { animation-delay: 0.25s; }
  @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
  .item-number { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em; margin-bottom: 8px; opacity: 0.4; }
  .item-text { font-size: 17px; font-weight: 300; line-height: 1.65; color: var(--text); }
  .item-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 14px 0 0 14px; }
  .error-msg { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--rose); padding: 20px; text-align: center; line-height: 1.6; }
  .theme-claude .briefing-keyword { color: var(--gold); } .theme-claude .play-btn { background: var(--gold); color: #0d0b0e; } .theme-claude .progress-bar { background: var(--gold); } .theme-claude .loading-dots span { background: var(--gold); } .theme-claude .item-stripe { background: var(--gold); } .theme-claude .item-number { color: var(--gold); }
  .theme-indie .briefing-keyword { color: var(--sage); } .theme-indie .play-btn { background: var(--sage); color: #0d0b0e; } .theme-indie .progress-bar { background: var(--sage); } .theme-indie .loading-dots span { background: var(--sage); } .theme-indie .item-stripe { background: var(--sage); } .theme-indie .item-number { color: var(--sage); }
  .theme-podcast .briefing-keyword { color: var(--lavender); } .theme-podcast .play-btn { background: var(--lavender); color: #0d0b0e; } .theme-podcast .progress-bar { background: var(--lavender); } .theme-podcast .loading-dots span { background: var(--lavender); } .theme-podcast .item-stripe { background: var(--lavender); } .theme-podcast .item-number { color: var(--lavender); }
  .theme-romance .briefing-keyword { color: var(--rose); } .theme-romance .play-btn { background: var(--rose); color: #0d0b0e; } .theme-romance .progress-bar { background: var(--rose); } .theme-romance .loading-dots span { background: var(--rose); } .theme-romance .item-stripe { background: var(--rose); } .theme-romance .item-number { color: var(--rose); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-eyebrow">Good morning</div>
    <div class="header-title"><em>Cissy's</em> Intel</div>
  </div>
  <div id="home">
    <div class="date-line" id="date-line">—</div>
    <div class="briefing-grid">
      <button class="briefing-btn btn-claude" onclick="startBriefing('CLAUDE')">
        <div class="btn-glow"></div>
        <div><div class="btn-keyword">Daily</div><div class="btn-label btn-accent">Claude<em>Tips</em></div></div>
        <div class="btn-desc">Workflows &amp; prompts for creative pros</div>
        <div class="btn-arrow btn-accent">→</div>
      </button>
      <button class="briefing-btn btn-indie" onclick="startBriefing('INDIE')">
        <div class="btn-glow"></div>
        <div><div class="btn-keyword">Daily</div><div class="btn-label btn-accent">Indie<em>News</em></div></div>
        <div class="btn-desc">Self-publishing trends &amp; platform shifts</div>
        <div class="btn-arrow btn-accent">→</div>
      </button>
      <button class="briefing-btn btn-podcast" onclick="startBriefing('PODCAST')">
        <div class="btn-glow"></div>
        <div><div class="btn-keyword">Daily</div><div class="btn-label btn-accent">Pod<em>Cast</em></div></div>
        <div class="btn-desc">Episode angles for Wednesday's show</div>
        <div class="btn-arrow btn-accent">→</div>
      </button>
      <button class="briefing-btn btn-romance" onclick="startBriefing('ROMANCE')">
        <div class="btn-glow"></div>
        <div><div class="btn-keyword">Daily</div><div class="btn-label btn-accent">Romance<em>Intel</em></div></div>
        <div class="btn-desc">Seven-figure visibility &amp; earnings plays</div>
        <div class="btn-arrow btn-accent">→</div>
      </button>
    </div>
  </div>
  <div id="briefing-screen">
    <div class="briefing-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <div class="briefing-keyword" id="briefing-label">—</div>
    </div>
    <div class="audio-bar">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="audio-status" id="audio-status">ready</div>
    </div>
    <div class="briefing-content"><div id="briefing-body"></div></div>
  </div>
</div>
<script>
// ── PASTE YOUR API KEY BETWEEN THE QUOTES BELOW ──
// API key is handled securely by Cloudflare proxy
// ─────────────────────────────────────────────────
 
let currentKeyword='',utterance=null,isSpeaking=false,isPaused=false,fullText='',progressInterval=null;
const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
const now=new Date();
document.getElementById('date-line').textContent=`${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
const PROMPTS={
  CLAUDE:`You are Cissy's daily AI intelligence assistant. Search the web for the LATEST tips, workflows, prompts, and use cases for Claude AI. Focus on practical techniques a non-technical creative professional (romance author, podcaster) can apply TODAY. Avoid general AI news. Return EXACTLY 5 points numbered 1-5. No bullet symbols. Lead with most actionable first. 2-3 short sentences each. Natural spoken rhythm.`,
  INDIE:`You are Cissy's daily publishing intelligence assistant. Search the web for the LATEST news, trends, and developments in self-publishing across all genres. Broad appeal across fiction genres, not romance-specific. Return EXACTLY 5 points numbered 1-5. No bullet symbols. Lead with most interesting first. 2-3 short sentences each. Natural spoken rhythm.`,
  PODCAST:`You are Cissy's podcast content scout. Search the web for the LATEST news, controversies, and developments in self-publishing and indie author world for a Wednesday podcast. Platform changes, author earnings, publishing shifts, viral author stories, KU updates, retailer news, tools buzzing. Return 5 meaty items plus 1 podcasting tip, numbered 1-6. No bullet symbols. Short sentences, spoken rhythm.`,
  ROMANCE:`You are Cissy's daily romance market intelligence assistant. Search the web for what's working RIGHT NOW for romance authors chasing seven figures. Bestseller trends, reader behavior, visibility strategies, ads, KU vs wide, pricing, platform shifts. Return EXACTLY 5 points numbered 1-5. No bullet symbols. Most actionable first. Short sentences, natural spoken rhythm.`
};
function startBriefing(keyword){
  currentKeyword=keyword;
  document.getElementById('home').style.display='none';
  const screen=document.getElementById('briefing-screen');
  screen.style.display='flex';
  screen.className='active theme-'+keyword.toLowerCase();
  document.getElementById('briefing-label').textContent=keyword;
  document.getElementById('briefing-body').innerHTML=`<div class="loading-state"><div class="loading-dots"><span></span><span></span><span></span></div><div class="loading-text">searching the web…</div></div>`;
  document.getElementById('audio-status').textContent='loading';
  document.getElementById('progress-bar').style.width='0%';
  stopSpeech();
  fetchBriefing(keyword);
}
function goHome(){
  stopSpeech();
  document.getElementById('home').style.display='flex';
  const screen=document.getElementById('briefing-screen');
  screen.style.display='none';
  screen.className='';
}
async function fetchBriefing(keyword){
  try{
    const response=await fetch('https://tight-truth-449c.mecca2425.workers.dev/',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        
        
        
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:PROMPTS[keyword]+'\n\nToday is '+now.toDateString()+'. Search for content from the last 7 days only.'}]
      })
    });
    const data=await response.json();
    let text='';
    if(data.content){for(const block of data.content){if(block.type==='text')text+=block.text;}}
    if(!text)throw new Error(JSON.stringify(data));
    renderBriefing(text);
  }catch(err){
    document.getElementById('briefing-body').innerHTML=`<div class="error-msg">Couldn't load briefing.<br>Check connection and try again.<br><br><small>${err.message}</small></div>`;
    document.getElementById('audio-status').textContent='error';
  }
}
function renderBriefing(text){
  fullText=text;
  const lines=text.split('\n').filter(l=>l.trim());
  const items=[];let current='';
  for(const line of lines){
    if(/^\d+[\.\)]/.test(line.trim())){if(current)items.push(current.trim());current=line.replace(/^\d+[\.\)]\s*/,'');}
    else if(current){current+=' '+line.trim();}
    else{current=line.trim();}
  }
  if(current)items.push(current.trim());
  if(items.length===0)items.push(text);
  const html=items.map((item,i)=>`<div class="briefing-item"><div class="item-stripe"></div><div class="item-number">0${i+1}</div><div class="item-text">${item}</div></div>`).join('');
  document.getElementById('briefing-body').innerHTML=`<div class="briefing-items">${html}</div>`;
  document.getElementById('audio-status').textContent='tap play to listen';
  setTimeout(()=>{
    const els=document.querySelectorAll('.item-text');
    const spokenText=Array.from(els).map(el=>el.textContent).join('. ');
    autoPlay(spokenText);
  },800);
}
function autoPlay(text){if(window.speechSynthesis)speak(text);}
function speak(text){
  stopSpeech();
  if(!window.speechSynthesis){document.getElementById('audio-status').textContent='no tts available';return;}
  utterance=new SpeechSynthesisUtterance(text);
  utterance.rate=0.92;utterance.pitch=1.0;utterance.volume=1.0;
  const voices=speechSynthesis.getVoices();
  const preferred=voices.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Moira')||v.name.includes('Google UK English Female'));
  if(preferred)utterance.voice=preferred;
  utterance.onstart=()=>{isSpeaking=true;isPaused=false;document.getElementById('play-btn').textContent='⏸';document.getElementById('audio-status').textContent='playing';startProgress();};
  utterance.onend=()=>{isSpeaking=false;isPaused=false;document.getElementById('play-btn').textContent='▶';document.getElementById('audio-status').textContent='done';document.getElementById('progress-bar').style.width='100%';stopProgress();};
  utterance.onerror=()=>{isSpeaking=false;document.getElementById('play-btn').textContent='▶';document.getElementById('audio-status').textContent='tap play to listen';stopProgress();};
  speechSynthesis.speak(utterance);
}
function togglePlay(){
  if(!window.speechSynthesis)return;
  if(isSpeaking&&!isPaused){speechSynthesis.pause();isPaused=true;isSpeaking=false;document.getElementById('play-btn').textContent='▶';document.getElementById('audio-status').textContent='paused';stopProgress();}
  else if(isPaused){speechSynthesis.resume();isPaused=false;isSpeaking=true;document.getElementById('play-btn').textContent='⏸';document.getElementById('audio-status').textContent='playing';startProgress();}
  else if(fullText){const els=document.querySelectorAll('.item-text');const text=Array.from(els).map(el=>el.textContent).join('. ');speak(text||fullText);}
}
function stopSpeech(){
  if(window.speechSynthesis)speechSynthesis.cancel();
  isSpeaking=false;isPaused=false;
  document.getElementById('play-btn').textContent='▶';
  document.getElementById('audio-status').textContent='ready';
  document.getElementById('progress-bar').style.width='0%';
  stopProgress();
}
let progressStart=0,progressDuration=0;
function startProgress(){
  stopProgress();progressStart=Date.now();
  const wordCount=(fullText||'').split(/\s+/).length;
  progressDuration=(wordCount/130)*60*1000;
  progressInterval=setInterval(()=>{const elapsed=Date.now()-progressStart;const pct=Math.min((elapsed/progressDuration)*100,98);document.getElementById('progress-bar').style.width=pct+'%';},300);
}
function stopProgress(){if(progressInterval){clearInterval(progressInterval);progressInterval=null;}}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();}
</script>
</body>
</html>
